<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style type="text/css">
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { -ms-interpolation-mode:bicubic; border:0; outline:none; text-decoration:none; display:block; }
    body { margin:0; padding:0; background-color:#EBEBEB; }
    .btn-lima:hover { background-color:#b8e600 !important; }
    @media only screen and (max-width:480px) {
      .ew { width:100% !important; }
      .ep { padding:32px 24px !important; }
      .btn-lima { width:100% !important; box-sizing:border-box !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#EBEBEB;font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#EBEBEB;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table class="ew" role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;background:#FFFFFF;border-radius:20px;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,0.12);">

        <!-- HEADER -->
        <tr>
          <td style="background-color:#0A0A0A;padding:0;">
            <div style="height:3px;background-color:#CCFF00;width:100%;"></div>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding:24px 40px;" valign="middle" align="left">
                  <img src="https://artiverse-sigma.vercel.app/artiverse-logo.jpg" alt="Artiverse" width="120" style="display:block;width:120px;height:auto;border-radius:6px;" />
                </td>
                <td style="padding:24px 40px;" valign="middle" align="right">
                  <span style="display:inline-block;border:1px solid rgba(204,255,0,0.35);border-radius:100px;padding:6px 14px;font-size:11px;font-weight:400;color:rgba(255,255,255,0.5);letter-spacing:1.5px;text-transform:uppercase;">
                    {{tag}}
                  </span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- CUERPO -->
        <tr>
          <td class="ep" style="background:#FFFFFF;padding:48px 48px 32px 48px;">
            <p style="margin:0 0 12px 0;font-size:14px;color:#999999;">Hola {{firstName}},</p>
            <h1 style="margin:0 0 24px 0;font-size:32px;font-weight:500;color:#0A0A0A;letter-spacing:-0.02em;line-height:1.15;">
              {{title}}
            </h1>
            <p style="margin:0 0 20px 0;font-size:16px;color:#444444;line-height:1.7;">
              {{paragraph_1}}
            </p>
            <p style="margin:0 0 28px 0;font-size:16px;color:#444444;line-height:1.7;">
              {{paragraph_2}}
            </p>
          </td>
        </tr>

        <!-- CTA -->
        <tr>
          <td class="ep" style="background:#FFFFFF;padding:0 48px 48px 48px;" align="center">
            <a class="btn-lima" href="{{cta_url}}"
               style="background-color:#CCFF00;color:#0A0A0A;font-weight:500;font-size:15px;padding:18px 44px;border-radius:10px;text-decoration:none;display:inline-block;">
              {{cta_text}}
            </a>
          </td>
        </tr>

        <!-- FIRMA -->
        <tr>
          <td class="ep" style="background:#FFFFFF;padding:0 48px 40px 48px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
              <tr><td style="border-top:1px solid #EEEEEE;font-size:0;line-height:0;">&nbsp;</td></tr>
            </table>
            <p style="margin:0 0 4px 0;font-size:16px;font-weight:500;color:#0A0A0A;">Víctor</p>
            <p style="margin:0;font-size:13px;color:#999999;">Marketing &amp; Growth · Artiverse</p>
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td align="center" style="background:#F5F5F5;padding:20px 40px;border-top:1px solid #E8E8E8;">
            <p style="margin:0 0 4px 0;font-size:11px;color:#AAAAAA;">© 2026 Artiverse · Spain</p>
            <p style="margin:0;font-size:11px;color:#AAAAAA;">
              <a href="{{unsubscribe_url}}" style="color:#AAAAAA;text-decoration:underline;">Darse de baja</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>

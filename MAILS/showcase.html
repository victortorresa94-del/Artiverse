<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    img { border:0; outline:none; text-decoration:none; display:block; }
    body { margin:0; padding:0; background-color:#0A0A0A; }
    @media only screen and (max-width:480px) {
      .ew { width:100% !important; }
      .ep { padding:32px 24px !important; }
      .hero-title { font-size:32px !important; }
      .btn-lima { width:100% !important; box-sizing:border-box !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0A0A0A;font-family:'Outfit',-apple-system,sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table class="ew" role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;background:#0A0A0A;border-radius:20px;overflow:hidden;">

        <!-- HEADER MINIMAL -->
        <tr>
          <td style="padding:28px 40px;" align="left">
            <img src="https://artiverse-sigma.vercel.app/artiverse-logo.jpg" alt="Artiverse" width="40" style="display:block;width:40px;height:auto;border-radius:6px;" />
          </td>
        </tr>

        <!-- IMAGEN HERO -->
        <tr>
          <td>
            <img src="{{hero_image}}" alt="{{hero_alt}}" style="display:block;width:100%;height:auto;" />
          </td>
        </tr>

        <!-- LABEL + TÍTULO -->
        <tr>
          <td class="ep" style="padding:48px 48px 24px 48px;">
            <p style="margin:0 0 14px 0;font-size:11px;font-weight:500;color:#CCFF00;letter-spacing:2.5px;text-transform:uppercase;">
              {{label}}
            </p>
            <h1 class="hero-title" style="margin:0 0 18px 0;font-size:42px;font-weight:400;color:#FFFFFF;letter-spacing:-0.02em;line-height:1.08;">
              {{title}}
            </h1>
            <p style="margin:0;font-size:15px;color:rgba(255,255,255,0.55);font-style:italic;">
              {{subtitle}}
            </p>
          </td>
        </tr>

        <!-- CUERPO -->
        <tr>
          <td class="ep" style="padding:24px 48px 36px 48px;">
            <p style="margin:0 0 20px 0;font-size:16px;color:rgba(255,255,255,0.75);line-height:1.75;">
              {{paragraph_1}}
            </p>
            <p style="margin:0 0 20px 0;font-size:16px;color:rgba(255,255,255,0.75);line-height:1.75;">
              {{paragraph_2}}
            </p>

            <!-- Cita destacada -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:28px 0;">
              <tr>
                <td style="border-left:3px solid #CCFF00;padding-left:20px;">
                  <p style="margin:0;font-size:18px;color:#FFFFFF;line-height:1.5;font-style:italic;font-weight:300;">
                    "{{quote}}"
                  </p>
                  <p style="margin:10px 0 0 0;font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;">
                    — {{quote_author}}
                  </p>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:16px;color:rgba(255,255,255,0.75);line-height:1.75;">
              {{paragraph_3}}
            </p>
          </td>
        </tr>

        <!-- CTA -->
        <tr>
          <td class="ep" style="padding:0 48px 48px 48px;" align="center">
            <a class="btn-lima" href="{{cta_url}}"
               style="background-color:#CCFF00;color:#0A0A0A;font-weight:500;font-size:15px;padding:18px 44px;border-radius:10px;text-decoration:none;display:inline-block;">
              {{cta_text}}
            </a>
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td align="center" style="padding:32px 40px;border-top:1px solid rgba(255,255,255,0.08);">
            <p style="margin:0 0 4px 0;font-size:11px;color:rgba(255,255,255,0.35);">© 2026 Artiverse · Spain</p>
            <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.35);">
              <a href="{{unsubscribe_url}}" style="color:rgba(255,255,255,0.35);text-decoration:underline;">Darse de baja</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
